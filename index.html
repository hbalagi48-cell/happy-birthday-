<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    background:linear-gradient(#ffe0ef,#fff);
    font-family:sans-serif;
    overflow:hidden;
}


/* 첫 화면 */

.intro {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.intro h1 {
    color:#df6aa7;
    font-size:48px;
}

.intro p {
    color:#a77;
}

button {
    margin-top:30px;
    padding:15px 45px;
    border:0;
    border-radius:40px;
    background:#f48fb1;
    color:white;
    font-size:18px;
}



/* 책 */

.book {
    display:none;
    width:380px;
    height:520px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    perspective:1500px;
}


.cover {
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff8fc7,#ffc1df);
    border-radius:20px;
    z-index:5;
    transform-origin:left;
    transition:1.5s;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:38px;
    font-weight:bold;
}


.book:hover .cover {
    transform:rotateY(-140deg);
}



.pages {

    width:100%;
    height:100%;

    background:#fff9fc;

    border-radius:20px;

    padding:20px;

    box-sizing:border-box;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

}



.card {

    background:white;

    padding:8px;

    border-radius:15px;

    box-shadow:0 5px 15px #ddd;

    animation:up 1s;

}



.card img {

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:10px;

}



.card p {

    margin:8px;

    color:#d46b9f;

    font-size:13px;

}



@keyframes up {

from {
    opacity:0;
    transform:translateY(30px);
}

to {
    opacity:1;
}

}



</style>

</head>


<body>


<div class="intro" id="intro">

<h1>✨ Memory Archive ✨</h1>

<p>A special little exhibition</p>

<button onclick="openBook()">Open Book 💗</button>

</div>



<div class="book" id="book">

<div class="cover">
Birthday Archive
</div>


<div class="pages">


<div class="card">
<img src="images/1.jpg">
<p>첫 번째 기억 ✨</p>
</div>


<div class="card">
<img src="images/2.jpg">
<p>소중한 순간</p>
</div>


<div class="card">
<img src="images/3.jpg">
<p>함께한 이야기</p>
</div>


<div class="card">
<img src="images/4.jpg">
<p>빛나는 하루</p>
</div>


<div class="card">
<img src="images/5.jpg">
<p>잊지 못할 장면</p>
</div>


<div class="card">
<img src="images/6.jpg">
<p>마지막 페이지 💗</p>
</div>


</div>

</div>



<script>

function openBook(){

document.getElementById("intro").style.display="none";

document.getElementById("book").style.display="block";

}

</script>


</body>
</html>
