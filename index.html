<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pink Memory Book</title>

<style>

body {
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#ffd6ea,#fff0f7);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
}

.book {
    width:360px;
    height:500px;
    position:relative;
    perspective:1500px;
}

.cover {
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff8fc7,#ffb6dc);
    border-radius:20px;
    position:absolute;
    z-index:10;
    transform-origin:left;
    transition:1.5s;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:38px;
    font-weight:bold;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.book:hover .cover {
    transform:rotateY(-140deg);
}

.pages {
    width:100%;
    height:100%;
    background:#fffafc;
    border-radius:20px;
    padding:25px;
    box-sizing:border-box;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    box-shadow:inset 0 0 30px rgba(255,150,200,0.3);
}

.photo {
    background:white;
    padding:8px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.5s;
}

.photo:hover {
    transform:translateY(-10px) rotate(3deg);
}

.photo img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

.title {
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#e86ba8;
    font-size:18px;
}

</style>

</head>

<body>

<div class="book">

<div class="cover">
💗 My Story
</div>


<div class="pages">

<div class="photo">
<img src="images/1.jpg">
</div>

<div class="photo">
<img src="images/2.jpg">
</div>

<div class="photo">
<img src="images/3.jpg">
</div>

<div class="photo">
<img src="images/4.jpg">
</div>

<div class="photo">
<img src="images/5.jpg">
</div>

<div class="photo">
<img src="images/6.jpg">
</div>

<div class="title">
A little memory book ✨
</div>

</div>

</div>

</body>
</html>
