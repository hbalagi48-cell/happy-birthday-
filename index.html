<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Archive</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(#ffe4f1,#fff);
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
}


.book{

width:360px;
height:500px;
position:relative;
perspective:1500px;

}


.page{

position:absolute;
width:100%;
height:100%;
background:#fffafa;
border-radius:20px;
box-shadow:0 20px 40px #ddd;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

transition:1s;
transform-origin:left;

}


.page:hover{
transform:rotateY(-130deg);
}


.cover{

background:linear-gradient(135deg,#ff8fc7,#ffc9e3);
color:white;
font-size:38px;
font-weight:bold;
z-index:10;

}


img{

width:75%;
height:50%;
object-fit:cover;
border-radius:15px;

}


input, textarea{

width:70%;
padding:10px;
margin:5px;

border:1px solid #ffc0da;
border-radius:10px;

}



textarea{

height:70px;
resize:none;

}



button{

background:#f48fb1;
border:0;
color:white;
padding:10px 25px;
border-radius:30px;
cursor:pointer;

}



.message{

margin-top:10px;
font-size:13px;
color:#c85d91;

}



</style>

</head>


<body>


<div class="book">


<div class="page cover">

💗 Birthday Book

</div>



<div class="page">

<img src="images/1.jpg">

<h2>
Memory
</h2>

<p>
A special moment ✨
</p>

</div>



<div class="page">

<h2>💌 Guest Book</h2>

<input id="name" placeholder="이름">

<textarea id="text" placeholder="메시지를 남겨주세요"></textarea>

<button onclick="saveMessage()">
남기기
</button>


<div class="message" id="message">

</div>


</div>



<div class="page">

<h1>
✨ Thank You ✨
</h1>

<p>
함께 기억해줘서 고마워요 💗
</p>

</div>



</div>



<script>


function saveMessage(){

let name=document.getElementById("name").value;

let text=document.getElementById("text").value;


document.getElementById("message").innerHTML =
name+" : "+text;


}



</script>


</body>
</html>
