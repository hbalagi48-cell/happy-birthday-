<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(#ffdcec,#fff);
    font-family:sans-serif;
}


/* 반짝이 */

.sparkle {
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation: sparkle 3s infinite;
}


@keyframes sparkle {

0% {
    opacity:0;
    transform:translateY(0) scale(0);
}

50% {
    opacity:1;
}

100% {
    opacity:0;
    transform:translateY(-300px) scale(1.5);
}

}



/* 첫 화면 */

.intro {

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

position:relative;

}


h1 {

color:#df6aa7;

font-size:48px;

}



button {

background:#f48fb1;

color:white;

border:0;

padding:15px 40px;

border-radius:40px;

font-size:18px;

cursor:pointer;

}



/* 책 */

.book {

display:none;

width:380px;

height:520px;

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

perspective:1500px;

}



.cover {

width:100%;

height:100%;

background:linear-gradient(135deg,#ff8fc7,#ffc5df);

border-radius:20px;

position:absolute;

z-index:5;

transform-origin:left;

transition:1.5s;

display:flex;

justify-content:center;

align-items:center;

color:white;

font-size:38px;

font-weight:bold;

}


.book:hover .cover {

transform:rotateY(-140deg);

}



.pages {

width:100%;

height:100%;

background:#fff8fc;

border-radius:20px;

padding:20px;

box-sizing:border-box;

}



.photos {

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}



.photos img {

width:100%;

height:120px;

object-fit:cover;

border-radius:10px;

}



.letter {

margin-top:15px;

background:white;

padding:15px;

border-radius:15px;

color:#c85d91;

display:none;

}



</style>

</head>


<body>


<!-- 반짝이 -->

<div class="sparkle" style="left:10%;top:80%;"></div>
<div class="sparkle" style="left:25%;top:90%;animation-delay:1s;"></div>
<div class="sparkle" style="left:50%;top:85%;animation-delay:2s;"></div>
<div class="sparkle" style="left:75%;top:90%;animation-delay:.5s;"></div>
<div class="sparkle" style="left:90%;top:80%;animation-delay:1.5s;"></div>



<div class="intro" id="intro">

<h1>✨ Memory Archive ✨</h1>

<p>A special little exhibition</p>

<button onclick="openBook()">
Open Book 💗
</button>

</div>



<div class="book" id="book">

<div class="cover">
Birthday Book
</div>


<div class="pages">

<div class="photos">

<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">

</div>

<button onclick="showLetter()">
💌 Open Letter
</button>


<div class="letter" id="letter">

<h3>To. My Favorite Person</h3>

<p>
항상 행복한 순간을 만들어줘서 고마워요.<br>
당신의 하루가 가장 빛나는 날이 되길 바라요 💗
</p>

</div>


</div>

</div>



<script>

function openBook(){

document.getElementById("intro").style.display="none";

document.getElementById("book").style.display="block";

}


function showLetter(){

document.getElementById("letter").style.display="block";

}


</script>


</body>
</html>
