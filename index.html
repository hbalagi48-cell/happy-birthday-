<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(#ffe1ef,#fff);
    font-family:sans-serif;
    text-align:center;
}


/* 첫 화면 */

.intro {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.intro h1 {
    color:#e66ca8;
    font-size:50px;
    letter-spacing:3px;
}

.intro p {
    color:#b77;
    font-size:18px;
}

button {
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:#f48fb1;
    color:white;
    font-size:18px;
    cursor:pointer;
}


/* 책 */

.book {
    display:none;
    width:360px;
    height:500px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    perspective:1500px;
}


.cover {
    width:100%;
    height:100%;
    background:#f48fb1;
    border-radius:20px;
    position:absolute;
    z-index:5;
    transform-origin:left;
    transition:1.5s;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

.book:hover .cover {
    transform:rotateY(-140deg);
}


.pages {
    background:white;
    width:100%;
    height:100%;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}


.pages img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}


</style>

</head>


<body>


<div class="intro" id="intro">

<h1>✨ Memory Archive ✨</h1>

<p>A little book full of precious moments</p>

<button onclick="openBook()">
Open Book 💗
</button>

</div>



<div class="book" id="book">

<div class="cover">
My Story
</div>

<div class="pages">

<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">

</div>

</div>



<script>

function openBook(){

document.getElementById("intro").style.display="none";

document.getElementById("book").style.display="block";

}

</script>


</body>
</html>
