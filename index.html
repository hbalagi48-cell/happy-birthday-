<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(#ffe0ef,#fff);
    font-family:sans-serif;
}


/* 음악 버튼 */

.music {
    position:fixed;
    top:20px;
    right:20px;
    background:#f48fb1;
    color:white;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
    z-index:20;
}



/* 첫 화면 */

.intro {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}


h1 {
    color:#df6aa7;
    font-size:50px;
}



button {
    margin-top:20px;
    background:#f48fb1;
    color:white;
    border:0;
    padding:15px 40px;
    border-radius:40px;
    font-size:17px;
}



/* 책 */

.book {

display:none;

width:380px;

height:520px;

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

perspective:1500px;

}



.cover {

width:100%;

height:100%;

background:linear-gradient(135deg,#ff8fc7,#ffc5df);

border-radius:20px;

position:absolute;

z-index:5;

transform-origin:left;

transition:1.5s;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:38px;

font-weight:bold;

}


.book:hover .cover {

transform:rotateY(-140deg);

}



.pages {

background:#fff8fc;

width:100%;

height:100%;

border-radius:20px;

padding:20px;

box-sizing:border-box;

text-align:center;

}



.photos {

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}


.photos img {

width:100%;

height:120px;

object-fit:cover;

border-radius:10px;

}



/* 편지 */

.letter {

display:none;

margin-top:15px;

background:#fff;

padding:20px;

border-radius:20px;

box-shadow:0 5px 20px #ddd;

color:#c85d91;

line-height:1.8;

font-size:14px;

}



</style>

</head>


<body>


<div class="music" onclick="musicPlay()">
🎵 Music
</div>


<audio id="bgm" loop>
<source src="music.mp3">
</audio>



<div class="intro" id="intro">

<h1>✨ Memory Archive ✨</h1>

<p>A special gift for you</p>

<button onclick="openBook()">
Open Book 💗
</button>

</div>



<div class="book" id="book">


<div class="cover">
My Story
</div>


<div class="pages">


<div class="photos">

<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">

</div>


<button onclick="letterOpen()">
💌 Letter
</button>


<div class="letter" id="letter">

<h3>To. My Star ✨</h3>

<p>
항상 많은 사람들에게 행복을 전해줘서 고마워요.<br><br>

당신이 걸어온 모든 순간들이 빛났고,<br>
앞으로의 모든 날들도 따뜻하게 빛나길 바라요.<br><br>

생일 진심으로 축하해요 💗
</p>

</div>


</div>

</div>



<script>


function openBook(){

document.getElementById("intro").style.display="none";

document.getElementById("book").style.display="block";

}



function letterOpen(){

document.getElementById("letter").style.display="block";

}



function musicPlay(){

let music=document.getElementById("bgm");

if(music.paused){

music.play();

}else{

music.pause();

}

}


</script>


</body>
</html>
