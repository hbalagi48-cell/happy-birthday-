<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Book</title>

<style>
body {
    margin: 0;
    background: #ffe6f2;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin-top: 50px;
    color: #d45a9e;
}

.book {
    width: 80%;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    perspective: 1200px;
}

.page {
    transition: 0.5s;
}

.page img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    cursor: pointer;
}

.page:hover {
    transform: rotateY(-15deg) scale(1.05);
}

</style>
</head>


<body>

<h1>✨ My Memory Book ✨</h1>

<div class="book">

<div class="page">
<img src="images/1.jpg">
</div>

<div class="page">
<img src="images/2.jpg">
</div>

<div class="page">
<img src="images/3.jpg">
</div>

<div class="page">
<img src="images/4.jpg">
</div>

<div class="page">
<img src="images/5.jpg">
</div>

<div class="page">
<img src="images/6.jpg">
</div>

</div>

</body>
</html>
