<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    background:linear-gradient(#ffe0ef,#fff);
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}


.book {

width:350px;

height:480px;

position:relative;

perspective:1500px;

}



.page {

position:absolute;

width:100%;

height:100%;

background:white;

border-radius:20px;

box-shadow:0 15px 40px #ccc;

transform-origin:left;

transition:1s;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}



.page img {

width:80%;

height:65%;

object-fit:cover;

border-radius:15px;

}



.page h2 {

color:#df6aa7;

}



.page p {

color:#b77;

}



.page:hover {

transform:rotateY(-120deg);

}



.cover {

background:linear-gradient(135deg,#ff8fc7,#ffc5df);

color:white;

font-size:40px;

font-weight:bold;

z-index:10;

}



.page1 {
z-index:9;
}

.page2 {
z-index:8;
}

.page3 {
z-index:7;
}

.page4 {
z-index:6;
}

.page5 {
z-index:5;
}



</style>

</head>


<body>



<div class="book">


<div class="page cover">
💗 Memory Book
</div>



<div class="page page1">

<img src="images/1.jpg">

<h2>First Memory</h2>

<p>첫 번째 페이지 ✨</p>

</div>



<div class="page page2">

<img src="images/2.jpg">

<h2>Beautiful Moment</h2>

<p>빛나는 순간</p>

</div>



<div class="page page3">

<img src="images/3.jpg">

<h2>Special Day</h2>

<p>소중한 기억</p>

</div>



<div class="page page4">

<img src="images/4.jpg">

<h2>Always Shine</h2>

<p>계속 빛나길</p>

</div>



<div class="page page5">

<img src="images/5.jpg">

<h2>Thank You</h2>

<p>고마운 마음</p>

</div>



</div>



</body>
</html>
