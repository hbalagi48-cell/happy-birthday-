<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Archive</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(#ffe4f1,#fff);
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
}


/* 꽃잎 */

.petal{
position:absolute;
top:-20px;
width:15px;
height:15px;
background:#ffb6d9;
border-radius:100% 0 100% 0;
animation:fall linear infinite;
}


@keyframes fall{

0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}

}


/* 책 */

.book{

width:360px;
height:500px;
position:relative;
perspective:1500px;

}


.page{

position:absolute;
width:100%;
height:100%;
background:white;
border-radius:20px;
box-shadow:0 20px 50px #ddd;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

transition:1s;
transform-origin:left;

}



.page:hover{

transform:rotateY(-130deg);

}



/* 표지 */

.cover{

background:linear-gradient(135deg,#ff8fc7,#ffcce4);
color:white;
font-size:40px;
font-weight:bold;
z-index:10;

animation:intro 2s;

}


.cover small{

display:block;
font-size:18px;
margin-top:20px;

}



@keyframes intro{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
}

}



img{

width:75%;
height:55%;
object-fit:cover;
border-radius:15px;

}



.letter{

padding:30px;
color:#c85d91;
line-height:2;

}



.end{

background:#fff0f7;
color:#d45a9e;

}



</style>

</head>


<body>



<div class="petal" style="left:10%;animation-duration:7s"></div>
<div class="petal" style="left:30%;animation-duration:9s"></div>
<div class="petal" style="left:50%;animation-duration:6s"></div>
<div class="petal" style="left:70%;animation-duration:8s"></div>
<div class="petal" style="left:90%;animation-duration:10s"></div>



<div class="book">


<div class="page cover">

💗 Birthday Archive

<small>
For [여진배우님]
</small>

</div>



<div class="page">

<img src="images/1.jpg">

<h2>Memory 01</h2>

<p>
소중한 순간
</p>

</div>



<div class="page">

<img src="images/2.jpg">

<h2>Memory 02</h2>

<p>
빛나는 하루
</p>

</div>



<div class="page letter">

<h2>💌 Letter</h2>

<p>

항상 많은 사람들에게<br>
행복을 전해줘서 고마워요.<br><br>

앞으로의 모든 날들이<br>
따뜻하게 빛나길 바라요.

</p>

</div>



<div class="page end">

<h1>✨ Thank You ✨</h1>

<p>
Happy Birthday 💗
</p>

</div>


</div>



</body>
</html>
