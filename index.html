<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pink Memory Book</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(#ffd6ea, #fff);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

.book {
    width: 320px;
    height: 450px;
    position: relative;
    perspective: 1500px;
}

.cover {
    width: 100%;
    height: 100%;
    background: #f48fb1;
    border-radius: 15px;
    position: absolute;
    transform-origin: left;
    transition: 1.5s;
    z-index: 5;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 35px;
    font-weight: bold;
}

.pages {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-sizing: border-box;
}

.pages img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    margin-bottom: 15px;
    border-radius: 10px;
}

.book:hover .cover {
    transform: rotateY(-130deg);
}

</style>

</head>

<body>

<div class="book">

<div class="cover">
💗 Memory
</div>

<div class="pages">
<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">
</div>

</div>

</body>
</html>
