<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Archive</title>

<style>

body {
    margin:0;
    height:100vh;
    background:linear-gradient(#ffe1f0,#fff);
    font-family:sans-serif;
    overflow:hidden;
}


.intro {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}


h1 {
    color:#df6aa7;
    font-size:48px;
}


button {
    background:#f48fb1;
    color:white;
    border:0;
    padding:15px 40px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}



.book {

    display:none;

    width:380px;
    height:520px;

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    perspective:1500px;

}



.cover {

    width:100%;
    height:100%;

    background:linear-gradient(135deg,#ff91c8,#ffc5df);

    border-radius:20px;

    position:absolute;

    z-index:5;

    transform-origin:left;

    transition:1.5s;


    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    font-size:38px;

    font-weight:bold;

}



.book:hover .cover {

    transform:rotateY(-140deg);

}



.pages {

    width:100%;

    height:100%;

    background:#fff8fc;

    border-radius:20px;

    padding:20px;

    box-sizing:border-box;

    text-align:center;

}



.photos {

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

}



.photos img {

    width:100%;

    height:120px;

    object-fit:cover;

    border-radius:10px;

}



.letter {

    margin-top:20px;

    background:#fff;

    padding:15px;

    border-radius:15px;

    color:#c85d91;

    display:none;

    animation:fade 1s;

}



@keyframes fade {

from {
opacity:0;
transform:translateY(20px);
}

to {
opacity:1;
}

}


</style>

</head>


<body>


<div class="intro" id="intro">

<h1>✨ Memory Archive ✨</h1>

<p>For your special day</p>

<button onclick="openBook()">
Open Book 💗
</button>

</div>



<div class="book" id="book">


<div class="cover">
Birthday Book
</div>



<div class="pages">


<div class="photos">

<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">

</div>



<button onclick="showLetter()">
💌 Open Letter
</button>



<div class="letter" id="letter">

<h3>To. My Favorite Person</h3>

<p>
항상 빛나는 모습 보여줘서 고마워요.<br>
당신의 하루가 행복으로 가득하길 바라요.<br>
앞으로도 오래오래 응원할게요 💗
</p>

</div>


</div>


</div>



<script>

function openBook(){

document.getElementById("intro").style.display="none";

document.getElementById("book").style.display="block";

}



function showLetter(){

document.getElementById("letter").style.display="block";

}

</script>


</body>
</html>
